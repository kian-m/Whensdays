server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Security headers (mirrors the API).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  # Proxy API calls to the Go service so the app stays single-origin.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Invite links: full-page loads get the API's Open Graph shell (chat-app
  # unfurls); it bounces browsers to the SPA route /ev/{id}.
  location /e/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
