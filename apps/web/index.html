<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whensdays — plans, minus the group-chat chaos</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <!-- iOS home-screen bookmarks need a PNG (SVG + transparency render black). -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#ee6c4d" />
    <!-- Link unfurls for the landing page itself (event links get richer,
         per-event cards from the API). %VITE_APP_ORIGIN% is baked at build time. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Whensdays" />
    <meta property="og:title" content="Whensdays — plans, minus the group-chat chaos" />
    <meta property="og:description" content="Pick a time, drop one link — friends RSVP and vote with no account needed." />
    <meta property="og:url" content="%VITE_APP_ORIGIN%/" />
    <meta property="og:image" content="%VITE_APP_ORIGIN%/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="description" content="Whensdays turns ‘we should hang out’ into real plans: pick a time or let everyone vote, and invite friends with one link — no account needed to join." />
  </head>
  <body>
    <!-- Apply the saved theme before first paint to avoid a flash. Default = dark. -->
    <script>
      try {
        if (localStorage.getItem("whensdays.theme") === "light")
          document.documentElement.setAttribute("data-theme", "light");
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
