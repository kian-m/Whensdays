<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whensdays — plans, minus the group-chat chaos</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#5b54e6" />
    <meta name="description" content="Whensdays turns ‘we should hang out’ into real plans: pick a time or let everyone vote, and invite friends with one link — no account needed to join." />
  </head>
  <body>
    <!-- Apply the saved theme before first paint to avoid a flash. Default = dark. -->
    <script>
      try {
        if (localStorage.getItem("whensdays.theme") === "light")
          document.documentElement.setAttribute("data-theme", "light");
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
