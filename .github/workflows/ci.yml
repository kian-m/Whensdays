name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets:
    # Secret scanner — fails the build if any credential is committed (full
    # history on push, PR range on pull_request). See .gitleaks.toml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  docs:
    # Flag PRs that change app code without updating the docs. Bypass with
    # "[skip-docs]" in the PR title when a change genuinely needs no doc update.
    # Dependabot can't update the docs - its PRs are exempt.
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require doc updates for code changes
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$TITLE" | grep -qi '\[skip-docs\]'; then
            echo "skip-docs flagged in PR title — skipping doc check"; exit 0
          fi
          changed=$(git diff --name-only "$BASE" "$HEAD")
          echo "$changed"
          if echo "$changed" | grep -q '^apps/' && ! echo "$changed" | grep -Eq '^(README\.md|CLAUDE\.md)$'; then
            echo "::error::App code changed under apps/ but README.md / CLAUDE.md were not updated. Update the docs (or add [skip-docs] to the PR title)."
            exit 1
          fi
          echo "docs check passed"

  screenshots:
    # Regenerate the README feature screenshots as a docs ARTIFACT — not a
    # correctness gate. continue-on-error so it never reds the build: the shots
    # are full-page (they render relative dates, so they drift daily) AND the
    # step rebuilds Docker images, which can flake on transient network errors
    # (e.g. `go mod download` hitting proxy.golang.org). The real gates are the
    # api/web/e2e jobs. The fresh PNGs still upload for review.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Regenerate screenshots
        run: make docs-shots
      # Report drift as a warning, don't fail the build: the feature screenshots
      # are FULL-PAGE and render relative dates (the availability grid starts at
      # "today"; the calendar shows the current month), so the regenerated PNGs
      # differ from any committed set on a later day no matter the code. A strict
      # pixel gate would need both the browser AND server clocks frozen. The fresh
      # PNGs are still uploaded below as an artifact for docs/PR review.
      - name: Report if screenshots changed
        run: |
          if ! git diff --quiet -- docs/screenshots; then
            echo "::warning::docs/screenshots differ from the committed set (expected: full-page shots render today's date). Run 'make docs-shots' to refresh."
            git --no-pager diff --stat -- docs/screenshots
          else
            echo "screenshots are up to date"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: feature-screenshots
          path: docs/screenshots

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go mod tidy # generates go.sum (committed locally via `make install`)
        working-directory: apps/api
      - run: go vet ./...
        working-directory: apps/api
      - run: go test ./...
        working-directory: apps/api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build:web

  e2e:
    runs-on: ubuntu-latest
    needs: [api, web]
    # Run the FULL prod-shaped stack in containers (compose.e2e.yaml): web nginx →
    # API → Postgres, in AUTH_MODE=dev so it's hermetic — no Clerk account, no
    # secrets, deterministic. This is the exact command developers run locally
    # (`make e2e-docker`), so CI == local. The previous job started `go run .`
    # against real Clerk and timed out on clerk.signIn in CI; dev mode removes
    # that dependency and the flakiness with it.
    steps:
      - uses: actions/checkout@v7
      - run: make e2e-docker
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
