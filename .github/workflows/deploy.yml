name: deploy

# Deploys on green main: API -> Cloud Run, web -> Cloudflare Pages.
# Fill the env block + repo secrets once (see docs/DEPLOY.md). No long-lived
# cloud keys: GCP auth uses Workload Identity Federation (OIDC).
on:
  push:
    branches: [main]
  workflow_dispatch: # manual re-runs (e.g. after updating API_PUBLIC_URL)

env:
  GCP_PROJECT: whensdays
  GCP_REGION: us-central1
  AR_REPO: whensdays # Artifact Registry repo name
  SERVICE: whensdays-api # Cloud Run service name

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/api:${GITHUB_SHA}"
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          docker build -t "$IMAGE" apps/api
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Deploy to Cloud Run
        run: |
          # min-instances 1 + cpu-boost kill cold starts (the biggest perceived-
          # latency source for a scale-to-zero API). Costs a few $/mo of idle —
          # speed outranks hosting cost in this repo's priorities; set back to 0
          # to return to ~$0 idle.
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --project "$GCP_PROJECT" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --max-instances 2 \
            --cpu-boost \
            --port 8080 \
            --set-env-vars "APP_ENV=production,RUN_MIGRATIONS=true,POSTHOG_HOST=https://us.i.posthog.com,APP_VERSION=${GITHUB_SHA},APP_ORIGIN=${{ secrets.APP_ORIGIN }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,CLERK_SECRET_KEY=CLERK_SECRET_KEY:latest,POSTHOG_API_KEY=POSTHOG_API_KEY:latest,POSTHOG_PERSONAL_API_KEY=POSTHOG_PERSONAL_API_KEY:latest,GUEST_TOKEN_KEY=GUEST_TOKEN_KEY:latest,KLIPY_API_KEY=KLIPY_API_KEY:latest,EMAIL_API_KEY=EMAIL_API_KEY:latest,EMAIL_FROM=EMAIL_FROM:latest,CRON_KEY=CRON_KEY:latest"
          # To enable more optional features, create their secrets (docs/DEPLOY.md §5b/5c)
          # and append to the --set-secrets line above, e.g.:
          #   ,GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,CALENDAR_TOKEN_KEY=CALENDAR_TOKEN_KEY:latest
      - name: Mark deploy in PostHog (annotation)
        continue-on-error: true # best-effort; skipped if secrets are absent
        env:
          PH_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          PH_PROJECT: ${{ secrets.POSTHOG_PROJECT_ID }}
        run: |
          if [ -n "$PH_KEY" ] && [ -n "$PH_PROJECT" ]; then
            curl -sS -X POST "https://us.posthog.com/api/projects/${PH_PROJECT}/annotations/" \
              -H "Authorization: Bearer ${PH_KEY}" -H "Content-Type: application/json" \
              -d "{\"content\":\"Deployed api ${GITHUB_SHA}\",\"scope\":\"project\"}"
          fi

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Single-origin proxy via Pages Functions: /api/* and /e/* (the OG-unfurl
      # shell) go to the Cloud Run API. NOT _redirects — Pages only proxies GET
      # through _redirects, which 405s every POST/PUT/DELETE.
      - run: |
          # wrangler bundles functions/ from the working directory (repo root).
          mkdir -p functions/api functions/e
          cat > functions/proxy.js <<'EOF'
          const ORIGIN = "__API_ORIGIN__";
          export async function proxy({ request }) {
            const u = new URL(request.url);
            return fetch(ORIGIN + u.pathname + u.search, request);
          }
          EOF
          sed -i "s|__API_ORIGIN__|${{ secrets.API_PUBLIC_URL }}|" functions/proxy.js
          printf 'import { proxy } from "../proxy.js";\nexport const onRequest = proxy;\n' > 'functions/api/[[path]].js'
          printf 'import { proxy } from "../proxy.js";\nexport const onRequest = proxy;\n' > 'functions/e/[[path]].js'
          rm -f apps/web/public/_redirects
      - run: pnpm build:web
        env:
          VITE_APP_ORIGIN: ${{ secrets.APP_ORIGIN }} # absolute URLs for the landing og: tags
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ vars.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_RECORD: ${{ vars.VITE_PUBLIC_POSTHOG_RECORD }}
      - uses: cloudflare/wrangler-action@v3
        with:
          packageManager: npm # isolate wrangler's own install from the pnpm workspace
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # First run creates the Pages project (the dashboard's default flow
          # makes a Worker instead, which can't serve our _redirects proxy).
          preCommands: wrangler pages project create whensdays --production-branch=main || true
          command: pages deploy apps/web/dist --project-name=whensdays # functions/ rides along from apps/web/functions
