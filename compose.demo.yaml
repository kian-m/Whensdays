# Run the app locally for manual navigation — only Docker required.
#   docker compose -f compose.demo.yaml up --build -d
#   open http://localhost:8080
# Uses dev auth mode (no Clerk account needed). NOT for production.
name: clsandbox-demo
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: clsandbox
      POSTGRES_PASSWORD: clsandbox
      POSTGRES_DB: clsandbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata_demo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clsandbox"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./apps/api
    environment:
      API_PORT: "8080"
      DATABASE_URL: postgres://clsandbox:clsandbox@db:5432/clsandbox?sslmode=disable
      AUTH_MODE: dev # stubbed auth — local navigation only
      CALENDAR_MODE: stub # stubbed calendar providers — lets you click Connect without real Google/Apple creds
      RUN_MIGRATIONS: "true" # apply schema on boot
      # Optional: export these in your shell to send demo analytics to PostHog.
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_PERSONAL_API_KEY: ${POSTHOG_PERSONAL_API_KEY:-}
      # Klipy GIF search for event covers (key stays server-side; see .env)
      KLIPY_API_KEY: ${KLIPY_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        VITE_AUTH_MODE: dev # Clerk-free bundle
        # Optional: export these to test the web analytics locally.
        VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY:-}
        VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
        VITE_PUBLIC_POSTHOG_RECORD: ${VITE_PUBLIC_POSTHOG_RECORD:-true}
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata_demo:
